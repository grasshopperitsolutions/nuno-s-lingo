<!doctype html>

    <!-- GitHub Pages SPA: restore path from ?p= query param set by 404.html -->
    <script>
      (function() {
        var redirect = window.location.search;
        if (redirect.startsWith('?p=')) {
          var path = decodeURIComponent(redirect.slice(3));
          // Preserve any additional query params or hash after the encoded path
          var rest = redirect.indexOf('&') !== -1
            ? redirect.slice(redirect.indexOf('&'))
            : '';
          window.history.replaceState(
            null, null,
            path + rest + window.location.hash
          );
        }
      })();
    </script>
    
    <!-- SEO Meta Tags -->
